services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tourisme_niger
      POSTGRES_USER: tourisme
      POSTGRES_PASSWORD: tourisme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://tourisme:tourisme@db:5432/tourisme_niger?schema=public
      NEXTAUTH_URL: http://localhost
      NEXTAUTH_SECRET: replace_with_a_long_random_secret
      BASE_URL: http://localhost
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: contact@tourisme.gouv.ne
      SMTP_TO: contact@tourisme.gouv.ne
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
