name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: tourisme_niger
          POSTGRES_USER: tourisme
          POSTGRES_PASSWORD: tourisme
        options: >-
          --health-cmd "pg_isready -U tourisme -d tourisme_niger"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://tourisme:tourisme@localhost:5432/tourisme_niger?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret
      BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy
      - run: npm run test
      - run: npm run build
